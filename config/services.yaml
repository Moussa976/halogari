# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    documents_directory: '%kernel.project_dir%/var/private/documents'
    legacy_documents_directory: '%kernel.project_dir%/public/uploads/documents'
    photos_directory: '%kernel.project_dir%/public/uploads/photos'
    messages_directory: '%kernel.project_dir%/public/uploads/messages'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    
    App\Twig\TwigExtensions:
        tags: [ 'twig.extension' ]
    App\Twig\DateExtension:
        tags: ['twig.extension']



    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\PushNotificationService:
        arguments:
            $vapidPublicKey: '%env(VAPID_PUBLIC_KEY)%'
            $vapidPrivateKey: '%env(VAPID_PRIVATE_KEY)%'
            $vapidEmail: '%env(VAPID_EMAIL)%'

    App\Service\AfficheService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\WebhookController:
        arguments:
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Service\ApiTokenService:
        arguments:
            $secret: '%env(APP_SECRET)%'

    App\Service\VillageCatalog:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\DocumentStorage:
        arguments:
            $documentsDirectory: '%documents_directory%'
            $legacyDocumentsDirectory: '%legacy_documents_directory%'

    App\Command\SendAdminAuditDigestCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'


